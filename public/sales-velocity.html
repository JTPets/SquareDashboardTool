<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Velocity Reports - Square Dashboard Addon</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* .container-xxl from shared.css (max-width: 1800px) */
    /* Page-specific: explicit text color for controls labels (shared has font only) */
    .controls label { color: #374151; }
    /* Page-specific: min-height (not in shared .controls select) */
    .controls select {
      min-height: 40px;
    }
    /* Page-specific: disabled state for .controls button (shared .btn:disabled uses opacity) */
    .controls button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* Page-specific: grid stats layout (not shared .stats-bar flex) */
    .stats {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
    }
    /* Page-specific: 15px padding, 6px radius (shared has 20px, 8px) */
    .stat-card {
      padding: 15px;
      border-radius: 6px;
    }
    /* Page-specific: 12px font, font-weight 600 (shared has 13px, normal) */
    .stat-label {
      font-size: 12px;
      font-weight: 600;
    }
    /* Page-specific: 24px font, 5px margin (shared has 28px, 4px) */
    .stat-value {
      font-size: 24px;
      margin-top: 5px;
    }
    .stat-subtext {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 3px;
    }

    /* page-specific: scrollable table height */
    .table-container { max-height: 60vh; overflow-y: auto; }
    /* page-specific: prevent header wrapping */
    th { white-space: nowrap; }
    .velocity-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .velocity-fast {
      background: #d1fae5;
      color: #065f46;
    }
    .velocity-moderate {
      background: #fef3c7;
      color: #92400e;
    }
    .velocity-slow {
      background: #fee2e2;
      color: #991b1b;
    }

    /* page-specific: larger block-centered spinner with lighter border */
    .spinner {
      display: block;
      border-color: #f3f3f3;
      border-top-color: #2563eb;
      width: 40px;
      height: 40px;
      margin: 0 auto 15px;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container container-xxl">
    <div class="header">
      <h1>📈 Sales Velocity Reports</h1>
      <a href="/dashboard.html" class="back-button">← Back to Dashboard</a>
    </div>

    <div class="controls">
      <label for="period">Analysis Period:</label>
      <select id="period">
        <option value="91">91 Days (3 months)</option>
        <option value="182">182 Days (6 months)</option>
        <option value="365">365 Days (1 year)</option>
      </select>
      <button data-action="loadData">📊 Load Data</button>
      <div class="info-badge" id="lastUpdated"></div>
    </div>

    <div class="stats" id="stats" style="display: none;">
      <div class="stat-card">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="totalProducts">-</div>
        <div class="stat-subtext">with sales data</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Daily Sales</div>
        <div class="stat-value" id="avgDailySales">-</div>
        <div class="stat-subtext">across all products</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fast Movers</div>
        <div class="stat-value" id="fastMovers">-</div>
        <div class="stat-subtext">> 1 unit/day</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Slow Movers</div>
        <div class="stat-value" id="slowMovers">-</div>
        <div class="stat-subtext">< 0.1 units/day</div>
      </div>
    </div>

    <div id="content">
      <div class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Loading sales velocity data...</p>
      </div>
      <div class="error" style="display: none;">
        <p id="errorMessage">Failed to load data</p>
      </div>
      <div class="table-container">
        <table id="dataTable" style="display: none;">
          <thead>
            <tr>
              <th>Product</th>
              <th>SKU</th>
              <th>Location</th>
              <th class="text-right">Total Sales</th>
              <th class="text-right">Period</th>
              <th class="text-right">Daily Avg</th>
              <th>Velocity</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Error Helper for user-friendly messages -->
  <script src="/js/error-helper.js"></script>
  <!-- Event delegation for CSP compliance -->
  <script src="/js/event-delegation.js"></script>
  <!-- Shared utilities -->
  <script src="/js/utils/escape.js"></script>
  <script src="/js/utils/format-currency.js"></script>
  <!-- Page-specific JavaScript (externalized for CSP compliance) -->
  <script src="/js/sales-velocity.js"></script>
  <script src="/js/feature-check.js" data-feature-key="reorder"></script>
</body>
</html>
