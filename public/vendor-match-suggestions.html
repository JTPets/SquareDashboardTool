<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Match Suggestions - Square Dashboard Addon</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* .container-wide from shared.css (max-width: 1400px) */

    .header a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      font-size: 14px;
    }
    .header a:hover { background: rgba(255,255,255,0.3); }

    /* STATUS TABS */
    .tab.active {
      color: #7c3aed;
      border-bottom-color: #7c3aed;
    }

    /* SUGGESTION CARD */
    .suggestion-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .suggestion-card:hover { border-color: #a78bfa; }

    .suggestion-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .suggestion-product {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }

    .suggestion-sku {
      font-size: 13px;
      color: #6b7280;
      margin-top: 2px;
    }

    .suggestion-upc {
      font-size: 12px;
      color: #9ca3af;
      font-family: monospace;
    }

    .vendor-comparison {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    .vendor-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 12px 16px;
    }

    .vendor-box.current { border-color: #d1fae5; background: #f0fdf4; }
    .vendor-box.suggested { border-color: #ddd6fe; background: #faf5ff; }

    .vendor-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .vendor-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .vendor-cost {
      font-size: 14px;
      color: #374151;
      margin-top: 4px;
    }

    .vendor-code {
      font-size: 12px;
      color: #9ca3af;
      font-family: monospace;
    }

    .cost-cheaper { color: #059669; font-weight: 600; }
    .cost-dearer  { color: #dc2626; font-weight: 600; }

    .arrow-icon {
      font-size: 24px;
      color: #7c3aed;
      text-align: center;
    }

    .suggestion-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-approve {
      background: #059669;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-approve:hover { background: #047857; }
    .btn-approve:disabled { background: #9ca3af; cursor: not-allowed; }

    .btn-reject {
      background: white;
      color: #dc2626;
      border: 1px solid #fca5a5;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-reject:hover { background: #fef2f2; border-color: #dc2626; }
    .btn-reject:disabled { color: #9ca3af; border-color: #e5e7eb; cursor: not-allowed; }

    /* BULK ACTIONS BAR */
    .bulk-bar {
      background: #faf5ff;
      border: 1px solid #ddd6fe;
      border-radius: 8px;
      padding: 14px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .bulk-bar label { display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; }
    .bulk-bar-spacer { flex: 1; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { margin-bottom: 8px; color: #374151; }

    /* STATUS BADGE */
    .badge-approved { background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .badge-rejected { background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .badge-pending  { background: #ede9fe; color: #5b21b6; padding: 2px 8px; border-radius: 12px; font-size: 12px; }

    /* BACKFILL SECTION */
    .backfill-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .backfill-box .info { flex: 1; }
    .backfill-box h4 { margin: 0 0 4px; color: #92400e; }
    .backfill-box p  { margin: 0; font-size: 13px; color: #78350f; }

    .btn-backfill {
      background: #d97706;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-backfill:hover  { background: #b45309; }
    .btn-backfill:disabled { background: #9ca3af; cursor: not-allowed; }

    /* LOAD MORE */
    .load-more-row { text-align: center; margin-top: 16px; }
    .btn-load-more {
      background: white;
      border: 1px solid #d1d5db;
      padding: 10px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #374151;
    }
    .btn-load-more:hover { border-color: #7c3aed; color: #7c3aed; }
  </style>
</head>
<body>
  <div class="header">
    <div class="container container-wide" style="display:flex;justify-content:space-between;align-items:center;padding:16px 24px;">
      <h1 style="color:white;margin:0;font-size:20px;">Vendor Match Suggestions</h1>
      <div style="display:flex;gap:10px;">
        <a href="/vendor-catalog.html">← Vendor Catalog</a>
        <a href="/vendor-dashboard.html">Vendor Dashboard</a>
      </div>
    </div>
  </div>

  <div class="container" style="padding:24px;">

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar" style="margin-bottom:24px;">
      <div class="stat">
        <div class="stat-number" id="statPending">—</div>
        <div class="stat-label">Pending Review</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statApproved">—</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="statRejected">—</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <!-- Backfill trigger -->
    <div class="backfill-box">
      <div class="info">
        <h4>Retroactive Scan</h4>
        <p>Scan all matched catalog items to find any products available from additional vendors not yet suggested.</p>
      </div>
      <button class="btn-backfill" id="btnBackfill" data-action="runBackfill">Run Scan</button>
    </div>

    <!-- Status tabs -->
    <div class="tabs" style="margin-bottom:20px;">
      <div class="tab active" data-status="pending" data-action="switchTab">Pending</div>
      <div class="tab" data-status="approved" data-action="switchTab">Approved</div>
      <div class="tab" data-status="rejected" data-action="switchTab">Rejected</div>
    </div>

    <!-- Bulk actions (pending only) -->
    <div class="bulk-bar" id="bulkBar">
      <label>
        <input type="checkbox" id="selectAll" data-action="toggleSelectAll"> Select all
      </label>
      <div class="bulk-bar-spacer"></div>
      <button class="btn-approve" id="btnBulkApprove" data-action="confirmBulkApprove" disabled>
        Approve Selected
      </button>
    </div>

    <!-- Suggestion list -->
    <div id="suggestionList"></div>
    <div class="load-more-row" id="loadMoreRow" style="display:none;">
      <button class="btn-load-more" data-action="loadMore">Load more</button>
    </div>

    <!-- Notification -->
    <div id="notification" style="display:none;position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:8px;font-weight:600;z-index:1000;"></div>

  </div>

  <script src="/js/utils/date-format.js"></script>
  <script src="/js/utils/toast.js"></script>
  <script src="/js/vendor-match-suggestions.js"></script>
  <div id="toast" class="toast"></div>
</body>
</html>
